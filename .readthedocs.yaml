version: 2

build:
  os: "ubuntu-22.04"
  tools:
    python: "3.11"
  jobs:
    pre_build:
      - echo "=== Verificando estrutura de arquivos ==="
      - ls -la docs/source/
      - echo "=== Subdiretórios ==="
      - ls -la docs/source/protocolo_de_comunicacao/ || echo "protocolo_de_comunicacao não encontrado"
      - ls -la docs/source/acesso_ao_pncp/ || echo "acesso_ao_pncp não encontrado"
      - echo "=== Verificando arquivos RST ==="
      - find docs/source -name "*.rst" -type f

python:
  install:
    - requirements: docs/requirements.txt

sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: false