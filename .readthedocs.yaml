  os: ubuntu-24.04
  tools:
    python: "3.13"

# Build documentation directly from the root directory with Sphinx
sphinx:
   configuration: conf.py # <- Corrigido aqui (removido o "docs/")

# Declare the Python requirements required to build your documentation
python:
   install:
     - requirements: requirements.txt # <- Ativado e apontando para a raiz